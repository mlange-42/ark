name: Compare benchmarks

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  tables:
    name: Compare Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.25.4'
      - name: Install dependencies
        run: go get .
      - name: Run benchmarks
        run: |
          cd ./benchmark
          go run ./compare
          cat benches.csv
      - name: Archive benchmark results
        uses: actions/upload-artifact@v4
        with:
          path: benchmark/benches.csv
          name: benches.csv
