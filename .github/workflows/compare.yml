name: Compare benchmarks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  BASE_REF: main

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repetition: [1, 2, 3]
    steps:
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.25.4'
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: go get .
        
      - name: Run benchmarks for current
        run: |
          cd ./benchmark
          go run ./compare
          cat bench.csv
      - name: Rename file
        run: mv benchmark/bench.csv benchmark/bench_current_${{ matrix.repetition }}.csv
      - name: Archive results
        uses: actions/upload-artifact@v6
        with:
          name: bench_current_${{ matrix.repetition }}
          path: benchmark/bench_current_${{ matrix.repetition }}.csv

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Switch to base commit
        if: github.event_name == 'pull_request'
        run: git checkout ${{ env.BASE_REF }}
      - name: Install dependencies
        run: go get .

      - name: Run benchmarks for main
        if: github.event_name == 'pull_request'
        run: |
          cd ./benchmark
          go run ./compare
          cat bench.csv
      - name: Rename file
        if: github.event_name == 'pull_request'
        run: mv benchmark/bench.csv benchmark/bench_main_${{ matrix.repetition }}.csv
      - name: Archive results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: bench_main_${{ matrix.repetition }}
          path: benchmark/bench_main_${{ matrix.repetition }}.csv

  compare:
    name: Compare benchmarks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
    - benchmark
    steps:
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.25.4'
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: go get .
      
      - uses: actions/download-artifact@v7
        with:
          name: bench_main_1
          path: benchmark/
      - uses: actions/download-artifact@v7
        with:
          name: bench_main_2
          path: benchmark/
      - uses: actions/download-artifact@v7
        with:
          name: bench_main_3
          path: benchmark/
      - uses: actions/download-artifact@v7
        with:
          name: bench_current_1
          path: benchmark/
      - uses: actions/download-artifact@v7
        with:
          name: bench_current_2
          path: benchmark/
      - uses: actions/download-artifact@v7
        with:
          name: bench_current_3
          path: benchmark/

      - name: Run comparison
        run: |
          cd ./benchmark
          go run ./compare/compare | tee compare.html

      - name: Archive results HTML
        uses: actions/upload-artifact@v6
        with:
          name: compare_html
          path: benchmark/compare.html

  comment:
    name: Comment on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - compare
    steps:
      - uses: actions/checkout@v6
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: compare_html
          path: .
      - name: Read benchmark results
        id: read_benchmark
        run: |
          echo 'comment<<EOF' >> $GITHUB_OUTPUT
          echo '<!-- benchmark-results -->' >> $GITHUB_OUTPUT
          cat compare.html >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      - name: Debug results
        run: cat compare.html
      - name: Find comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- benchmark-results -->'
      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.read_benchmark.outputs.comment }}
          edit-mode: replace
